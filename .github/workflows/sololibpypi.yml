name: sololibpypi

on:
  push:
    tags:
      - 'v*' # 仅在推送版本标签时触发，如 v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: sololib # 指向你仓库中设置的环境名称
    # 启用 Trusted Publishing 所需权限（推荐方式，无需配置 TOKEN）
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          # 启用缓存以进一步加快后续运行速度
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Build package
        # 构建的 wheel/sdist 会包含 pyproject.toml 中声明的所有可选依赖元数据
        # 用户安装时可正常使用 uv add sololib[image] / sololib[win32]
        run: uv build --sdist --wheel

      - name: Publish to PyPI
        # 使用官方 Action 进行发布
        uses: pypa/gh-action-pypi-publish@release/v1
